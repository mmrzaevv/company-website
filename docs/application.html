<section class="application">

<h1>Driver / Carrier Application</h1>

<p>Please fill out the form below if you would like to work with Globepro Logistics LLC.</p>

<form action="https://formsubmit.co/matt@globepro-llc.com" method="POST">

<input type="hidden" name="_subject" value="New Driver Application - Globepro Logistics">
<input type="hidden" name="_captcha" value="false">

<label>Business Name</label>
<input type="text" name="Business Name" required>

<label>Your Name</label>
<input type="text" name="Your Name" required>

<label>How many drivers do you have?</label>
<input type="number" name="Number of Drivers" required>

<label>How many vehicles do you have?</label>
<input type="number" name="Number of Vehicles" required>

<label>Email</label>
<input type="email" name="Email" required>

<label>Phone Number</label>
<input type="tel" name="Phone Number" required>

<label>Average Rate Per Mile ($)</label>
<input type="text" name="Rate Per Mile" required>

<button type="submit">Submit Application</button>

</form>

</section>
